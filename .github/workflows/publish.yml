name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write       # OIDC trusted publishing
  attestations: write   # PEP 740 / sigstore attestations

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs full history for version resolution
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --extra dev --extra mcp --extra explorer
      - run: uv run ruff check .
      - run: uv run pytest tests/test_schemas_hypothesis.py
      - run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
