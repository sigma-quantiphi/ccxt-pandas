name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --all-extras --all-groups
      - run: uv run python -m py_compile ccxt_pandas/__init__.py
      - run: uv run python -m py_compile ccxt_pandas_mcp/server.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --all-groups
      - run: uv run python -c "from ccxt_pandas import CCXTPandasExchange, AsyncCCXTPandasExchange; print('Import OK')"
      - run: uv run python -c "from ccxt_pandas_mcp.server import mcp; print('MCP import OK')"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
