name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user-facing pain point, not the implementation idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: If you have a concrete API in mind, show the call site.
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: ccxt_method
    attributes:
      label: Relevant CCXT method (if any)
      description: Name of the upstream `ccxt.Exchange` method this maps to.
